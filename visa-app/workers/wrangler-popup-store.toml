name = "hanpocket-popup-store"
main = "popup-store.js"
compatibility_date = "2024-09-23"
workers_dev = true

[[d1_databases]]
binding = "POPUPS_DB"
database_name = "hanpocket-popups"
database_id = "f76093f1-1abf-42ce-8a69-b392b30f813e"

# 어드민 토큰 설정 (배포 후 실행):
# npx wrangler secret put ADMIN_TOKEN -c workers/wrangler-popup-store.toml

# 배포:
# npx wrangler deploy -c workers/wrangler-popup-store.toml

# 로컬 테스트:
# npx wrangler dev workers/popup-store.js --port 8789 -c workers/wrangler-popup-store.toml
