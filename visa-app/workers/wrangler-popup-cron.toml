name = "hanpocket-popup-cron"
main = "popup-cron.js"
compatibility_date = "2024-09-23"
workers_dev = true

# 매일 09:00 KST (00:00 UTC) 자동 실행
[triggers]
crons = ["0 0 * * *"]

[[d1_databases]]
binding = "POPUPS_DB"
database_name = "hanpocket-popups"
database_id = "f76093f1-1abf-42ce-8a69-b392b30f813e"

# Secrets (배포 후 설정):
# npx wrangler secret put NAVER_CLIENT_ID -c workers/wrangler-popup-cron.toml
# npx wrangler secret put NAVER_CLIENT_SECRET -c workers/wrangler-popup-cron.toml

# 배포:
# npx wrangler deploy -c workers/wrangler-popup-cron.toml

# 수동 테스트:
# curl https://hanpocket-popup-cron.<your-subdomain>.workers.dev/collect
