name = "hanpocket-popup-parser"
main = "popup-parser.js"
compatibility_date = "2024-09-23"
workers_dev = true

# KV 없이도 동작 (캐싱 없이 실시간 fetch)
# KV 추가 원하면 아래 주석 해제 후 ID 입력:
# [[kv_namespaces]]
# binding = "KV"
# id = "YOUR_KV_NAMESPACE_ID"
# preview_id = "YOUR_PREVIEW_KV_ID"

# 배포 명령:
# npx wrangler deploy -c workers/wrangler-popup.toml
# 로컬 테스트:
# npx wrangler dev workers/popup-parser.js --port 8788 -c workers/wrangler-popup.toml
